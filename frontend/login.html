<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTicket - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">SmartTicket</div>
            <nav></nav>
        </header>

        <main class="auth-page">
            <div class="auth-card">
                <h1>Welcome back</h1>
                <p class="auth-subtitle">Log in to view your bookings and book faster.</p>

                <form id="loginForm" class="auth-form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
                    </div>
                    <p id="loginError" class="auth-error" hidden></p>
                    <button type="submit" class="btn-primary btn-full">Log In</button>
                </form>

                <p class="auth-footer">
                    Don't have an account? <a href="register.html">Sign up</a>
                </p>
            </div>
        </main>
    </div>
    <script src="auth.js"></script>
    <script src="login.js"></script>
</body>
</html>
