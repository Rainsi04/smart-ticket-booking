<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTicket - Movies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">SmartTicket</div>
            <nav></nav>
        </header>

        <main>
            <div class="hero">
                <h1>Instantly</h1>
                <p>SmartTicket finds the best seats for your budget, group size, and preferences - so you enjoy every frame.</p>
                <div class="city-selector">
                    <label for="citySelect">📍 Select your city</label>
                    <select id="citySelect">
                        <option value="">Loading cities...</option>
                    </select>
                </div>
            </div>

            <div class="section-title">
                <h2>Now Showing</h2>
                <div class="search-box">
                    <input type="text" placeholder="Search movies..." id="movieSearch">
                </div>
            </div>

            <div class="movies-grid" id="moviesGrid">
                <!-- Movies will be dynamically loaded here by JavaScript -->
            </div>
        </main>
    </div>
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
