<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTicket - My Bookings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">SmartTicket</div>
            <nav></nav>
        </header>

        <main>
            <div class="section-title">
                <h2>My Bookings</h2>
            </div>

            <div id="bookingsLoading" class="bookings-message">Loading your bookings...</div>
            <div id="bookingsEmpty" class="bookings-message" hidden>
                <p>You haven't booked any tickets yet.</p>
                <a href="index.html" class="btn-primary">Browse Movies</a>
            </div>
            <div id="bookingsList" class="bookings-list"></div>
        </main>
    </div>
    <script src="auth.js"></script>
    <script src="my-bookings.js"></script>
</body>
</html>
